description: >-
  GridX sells the Enterprise Rate Platform (Rate Engine, Calculate, Analyze,
  Design, Forecast, Advise, Explore, Empower) to utilities, energy suppliers,
  and technology partners under enterprise / partner agreements. There is no
  public self-service pricing, free tier, or published usage rate card; access
  to the Calculate and Empower APIs is provisioned through a utility deployment
  contract and engagement with GridX sales. Pricing details below are not
  reconciled because GridX does not publish them.
notes: >-
  Enterprise/partner sales motion. Contact GridX for pricing. No public
  pay-as-you-go or tiered rate card was found; verify any terms directly with
  GridX during reconciliation.
sources:
- https://www.gridx.com/
- https://gridx.com/empower/
- https://gridx.com/calculate/
- https://gridx.com/partnerships/
