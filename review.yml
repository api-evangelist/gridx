  - url: https://api-calculate-docs.gridx.com/calculate-apis-gridx-docs/get-customer-info
    type: APIReference
    note: Customer Info endpoint - path, JWT auth, X-Contract-Id / X-Customer-Uuid headers, response fields.
  - url: https://api-calculate-docs.gridx.com/calculate-apis-gridx-docs/get-customer-usage
    type: APIReference
    note: Customer Usage endpoint - interval payloads, start/end params, token auth.
  - url: https://empower.gridx.com/
