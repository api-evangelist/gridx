actions:
  apisYmlUpdated: true
  reason: |
    GridX gridx.com publishes a real partner/enterprise API surface, so the
    catalog entry documents four sub-APIs (Rate Engine, Bill Calculation, Rate
    Analytics, OpenADR Programs) and an OpenAPI with only the documented
    endpoints. Plans, rate-limits, and finops are marked reconciled:false
    because GridX does not publish pricing, quotas, or a usage rate card. The
    company is carefully disambiguated from gridX GmbH (gridx.ai) and from
    Asia-based GridX battery/EV ventures.
