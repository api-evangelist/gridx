description: >-
  FinOps view of GridX Enterprise Rate Platform spend. GridX is sold to
  utilities and technology partners under enterprise / partner agreements rather
  than usage-metered self-service pricing, so there is no public rate card to
  reconcile. Cost is governed by the deployment contract (platform modules
  licensed, populations / meters served, and API entitlements for Calculate and
  Empower). The meters below are indicative of where cost and value
  accumulate for a GridX deployment; they are not published per-unit prices.
notes: >-
  No public usage-based pricing was found; treat this as an enterprise contract.
  Verify the actual billing model and any per-meter / per-population terms with
  GridX during reconciliation.
sources:
- https://www.gridx.com/
- https://gridx.com/empower/
- https://gridx.com/calculate/
