meters:
- name: platform_subscription
  description: Enterprise license for the GridX Enterprise Rate Platform modules in scope.
  unit: contract
  aggregation: sum
  dimensions:
  - utility
  - module
- name: meters_served
  description: Service agreements / meters processed by the Rate Engine and Calculate.
  unit: meters
  aggregation: sum
  dimensions:
  - utility
  - rate
- name: rate_analysis_runs
  description: Batch rate / bill / cost analysis runs across customer populations (Empower / Analyze).
  unit: runs
  aggregation: sum
  dimensions:
  - utility
  - program
- name: api_requests
  description: Calculate / Empower API requests (pricing, customer info/usage, bill and cost analysis).
  unit: requests
  aggregation: sum
  dimensions:
  - utility
  - api
principles:
- name: Visibility
  description: Track which platform modules and APIs are licensed and which utility populations they serve.
- name: Allocation
  description: Map GridX platform and API entitlements to internal rate-design, billing, and CX programs.
- name: Optimization
  description: Right-size the licensed module set and batch analysis cadence to actual rate-program needs.
- name: Accountability
  description: Assign owners per deployment / utility program and review contract value against outcomes.
