    type: Postman
  description: GridX Calculate accurately calculates bills based on tariff, contract,
    rider, option, and tax rules, with real-time rate analysis and the ability to apply
    modifiers to simulate behavior changes. Documented customer endpoints return account
    info (rate code, voltage class, circuit, CCA) and interval consumption/generation
    usage used as inputs to bill calculation.
