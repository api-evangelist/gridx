aid: gridx
url: https://raw.githubusercontent.com/api-evangelist/gridx/refs/heads/main/apis.yml
name: GridX
kind: company
description: GridX Inc. (Walnut Creek, California) is the Enterprise Rate Platform
  for modern utilities. Its cloud-based Rate Engine replicates utility billing-system
  (CIS) bill calculations to design, measure, implement, and bill advanced rates and
  programs. GridX exposes a partner/enterprise developer API (the Calculate / Empower
  APIs) for rate calculation, pricing retrieval, customer info/usage, bill and cost
  analysis, and OpenADR demand-response program subscriptions, currently documented
  for specific utility deployments (e.g., PG&E, SCE).
