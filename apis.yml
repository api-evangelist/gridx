  description: Cloud-based Rate Engine that replicates utility CIS bill calculations.
    The documented Pricing API returns historical, current, and forecasted dynamic
    prices (generation and distribution components per interval) for a given utility,
    market, program, and rate, with examples for PG&E and SCE deployments.
